[build]
  base = "frontend"
  command = "npm run build"
  publish = "dist"

[functions]
  directory = "../backend"

[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/api/:splat"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[build.environment]
  NODE_VERSION = "20"
  VITE_API_URL = "/api"